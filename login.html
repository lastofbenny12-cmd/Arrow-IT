<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ARROW IT</title>
  <meta name="description" content="Arrow Portal — Login & Registrierung." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" href="assets/img/logo.svg" type="image/svg+xml" />
</head>
<body>
  <main>
    <header class="page-hero">
      <span class="kicker">✦ arrow portal</span>
      <h1>LOGIN</h1>
      <p>Rein und los.</p>
    </header>

    <section class="portal auth-card">
      <div class="portal-glow" aria-hidden="true"></div>
      <img class="logo-mark portal-logo" src="assets/img/logo.svg" alt="Arrow IT" />
      <h2 class="portal-title">ARROW PORTAL</h2>
      <p class="portal-sub">Welcome</p>

      <div class="portal-tabs" role="tablist">
        <button class="ptab active" data-tab="email" role="tab">EMAIL</button>
        <button class="ptab" data-tab="phone" role="tab">PHONE</button>
      </div>

      <!-- LOGIN EMAIL -->
      <form class="portal-form" id="emailForm" autocomplete="off">
        <label class="field"><input type="email" name="email" placeholder=" " required /><span class="field-label">EMAIL</span></label>
        <label class="field"><input type="password" name="password" placeholder=" " required /><span class="field-label">PASSWORD</span></label>
        <button type="submit" class="btn-main full">LOGIN <span class="btn-arrow">➤</span></button>
      </form>

      <!-- LOGIN PHONE -->
      <form class="portal-form hidden" id="phoneForm" autocomplete="off">
        <label class="field"><input type="tel" name="phone" placeholder=" " required /><span class="field-label">PHONE (+49…)</span></label>
        <button type="button" class="btn-main full" id="sendCode">SEND CODE <span class="btn-arrow">➤</span></button>
        <label class="field hidden" id="codeField"><input type="text" name="code" placeholder=" " inputmode="numeric" autocomplete="one-time-code" /><span class="field-label">CODE</span></label>
        <button type="submit" class="btn-main full hidden" id="verifyCode">VERIFY <span class="btn-arrow">➤</span></button>
        <div id="recaptcha-container"></div>
      </form>

      <!-- SIGN UP -->
      <form class="portal-form hidden" id="signupForm" autocomplete="off">
        <label class="field"><input type="email" name="email" placeholder=" " required /><span class="field-label">EMAIL</span></label>
        <label class="field"><input type="password" name="password" placeholder=" " required /><span class="field-label">PASSWORD</span></label>
        <button type="submit" class="btn-main full">CREATE ACCOUNT <span class="btn-arrow">➤</span></button>
      </form>

      <div class="auth-switch">
        <span id="switchToSignup">no account yet? <button id="toSignup">sign up ➤</button></span>
        <span id="switchToLogin" class="hidden">already registered? <button id="toLogin">login ➤</button></span>
        <span style="display:block; margin-top:10px; opacity:.85;">Admin? <a href="admintoken.html" class="btn-ghost" style="padding: 10px 18px;">ADMIN LOGIN</a></span>
      </div>

      <p class="portal-msg" id="portalMsg"></p>

    </section>
  </main>

  <script src="assets/js/main.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="assets/js/firebase.js"></script>
</body>
</html>
